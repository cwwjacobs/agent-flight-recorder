services:
  afr:
    build: .
    image: agent-flight-recorder:latest
    ports:
      # localhost-only by default: recorded payloads are sensitive. To expose
      # on the network, change to "8700:8700" AND set AFR_API_TOKEN.
      - "127.0.0.1:8700:8700"
    environment:
      # Advanced/experimental features stay opt-in (local flag — no billing).
      AFR_EXPERIMENTAL_FEATURES_ENABLED: ${AFR_EXPERIMENTAL_FEATURES_ENABLED:-false}
      AFR_REDACTION_ENABLED: ${AFR_REDACTION_ENABLED:-true}
      # Replay plan preparation is on so `make demo-docker` works end to end.
      # The server never executes your code; execution stays client-side
      # (see docs/replay.md).
      AFR_REPLAY_ENABLED: ${AFR_REPLAY_ENABLED:-true}
      # SECURITY: no auth unless a token is set. Publishing 8700 exposes the API
      # to your host/network — set AFR_API_TOKEN for any non-loopback use.
      AFR_API_TOKEN: ${AFR_API_TOKEN:-}
      AFR_CORS_ORIGINS: ${AFR_CORS_ORIGINS:-}
      AFR_DEMO_SEED_ENABLED: ${AFR_DEMO_SEED_ENABLED:-true}
    volumes:
      - afr-data:/data
    restart: unless-stopped

volumes:
  afr-data:
