name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Python tests (3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend, SDK, CLI
        run: pip install -e ./sdk -e ./cli -e './backend[dev]'
      - name: Run test suite
        run: python -m pytest backend/tests -q

  ui:
    name: UI build (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run build
